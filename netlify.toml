[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY"

[functions."lock-fixtures"]
  schedule = "*/5 * * * *"

[functions."run-fixtures"]
  schedule = "*/5 * * * *"

[functions."world-maintenance"]
  schedule = "17 * * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store"
