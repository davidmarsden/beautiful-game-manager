name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run calibration:report
      - run: npm run calibration:rating-bands
      - run: npm run calibration:shadow
      - run: npm run calibration:league-structure
      - run: npm run calibration:rollover
      - run: npm run calibration:availability
      - run: npm run calibration:season-availability
      - run: npm run calibration:manager-decisions
      - run: npm run calibration:ai-season
      - run: npm run calibration:multi-season
      - run: npm run calibration:final-outcomes
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibration-report
          path: calibration/generated/
      - run: npm test
