name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run calibration:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibration-report
          path: calibration/generated/
