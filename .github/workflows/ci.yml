name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run calibration:report
      - run: npm run calibration:rating-bands
      - run: npm run calibration:shadow
      - run: npm run calibration:league-structure
      - run: npm run calibration:rollover
      - run: npm run calibration:availability
      - run: npm run calibration:season-availability
      - run: npm run calibration:manager-decisions
      - run: npm run calibration:ai-season
      - run: npm run calibration:multi-season
      - run: npm run calibration:final-outcomes
      - run: npm run release-candidate:constitutional
      - run: npm run playable:human-season
      - run: npm run squad-cycle:foundations
      - run: npm run squad-intelligence:report
      - run: npm run ai-squad-management:report
      - run: npm run season-archive:report
      - run: npm run persistent-world:report
      - run: npm run release-candidate:playable-world
      - run: npm run persistent-league:report
      - run: npm run persistent-matchday:report
      - run: npm run player-lifecycle:report
      - run: npm run world-operations:report
      - run: npm run release-candidate:representative-world
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibration-report
          path: |
            calibration/generated/
            reports/generated/
      - name: Run canonical world initializer tests
        run: node --test test/pr84CanonicalWorldInitialization.test.js
      - name: Run test suite with captured output
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-test-output
          path: npm-test-output.log
